<div x-show="view === 'dashboard'" x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 transform scale-95"
    x-transition:enter-end="opacity-100 transform scale-100">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div
            class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 card-hover flex items-center gap-5">
            <div
                class="w-14 h-14 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center text-2xl">
                <i class="fas fa-folder"></i>
            </div>
            <div>
                <p class="text-sm font-medium text-gray-500">Total Arsip</p>
                <p class="text-2xl font-bold text-gray-900" x-text="dashboardData?.totalArsip || 0"></p>
            </div>
        </div>
        <div
            class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 card-hover flex items-center gap-5">
            <div
                class="w-14 h-14 rounded-full bg-green-50 text-green-600 flex items-center justify-center text-2xl">
                <i class="fas fa-layer-group"></i>
            </div>
            <div>
                <p class="text-sm font-medium text-gray-500">Total Bidang</p>
                <p class="text-2xl font-bold text-gray-900" x-text="dashboardData?.totalBidang || 0">
                </p>
            </div>
        </div>
        <div
            class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 card-hover flex items-center gap-5">
            <div
                class="w-14 h-14 rounded-full bg-teal-50 text-teal-600 flex items-center justify-center text-2xl">
                <i class="fas fa-file-signature"></i>
            </div>
            <div>
                <p class="text-sm font-medium text-gray-500">Arsip Aktif</p>
                <p class="text-2xl font-bold text-gray-900" x-text="dashboardData?.arsipAktif || 0"></p>
            </div>
        </div>
        <div
            class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 card-hover flex items-center gap-5">
            <div
                class="w-14 h-14 rounded-full bg-gray-50 text-gray-600 flex items-center justify-center text-2xl">
                <i class="fas fa-archive"></i>
            </div>
            <div>
                <p class="text-sm font-medium text-gray-500">Arsip Inaktif</p>
                <p class="text-2xl font-bold text-gray-900" x-text="dashboardData?.arsipInaktif || 0">
                </p>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold text-gray-800">Akses Cepat Pengunduhan Arsip</h3>
        </div>
        <div class="flex flex-col md:flex-row gap-4 items-end mb-6">
            <div class="flex-1 flex gap-4 w-full">
                <div class="w-1/2">
                    <label
                        class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Tanggal
                        Mulai</label>
                    <input type="date" x-model="filterDownload.startDate"
                        class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div class="w-1/2">
                    <label
                        class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Tanggal
                        Akhir</label>
                    <input type="date" x-model="filterDownload.endDate"
                        class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
            </div>
            <div class="flex gap-3">
                <button @click="downloadExcel()"
                    class="flex items-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-sm font-medium btn-hover shadow-lg shadow-emerald-100">
                    <i class="fas fa-file-excel"></i> Download Excel
                </button>
                <button @click="downloadZip()"
                    class="flex items-center gap-2 bg-amber-500 hover:bg-amber-600 text-white px-5 py-2.5 rounded-xl text-sm font-medium btn-hover shadow-lg shadow-amber-100">
                    <i class="fas fa-file-archive"></i> Download ZIP
                </button>
            </div>
        </div>
        <p class="text-gray-500 text-sm">Unduh seluruh data arsip untuk keperluan rekapitulasi,
            pelaporan, atau backup (Spreadsheet & ZIP Kompresi). Kosongkan rentang tanggal untuk
            mengunduh semua data.</p>
    </div>
</div>
