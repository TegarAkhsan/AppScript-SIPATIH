<div x-show="view === 'tracking'" x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <h3 class="text-lg font-bold text-gray-800">Tracking Aktivitas Pengguna</h3>
            <button @click="loadTracking"
                class="text-gray-500 hover:text-emerald-600 p-2 transition-colors"><i
                    class="fas fa-sync-alt"></i></button>
        </div>
        <div class="p-8">
            <div class="relative wrap overflow-hidden h-full">
                <div class="border-2-2 absolute border-opacity-20 border-gray-300 h-full border left-5">
                </div>

                <template x-for="(log, index) in aktivitasData" :key="index">
                    <div class="mb-8 flex items-start w-full relative">
                        <div
                            class="z-20 w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center text-white shadow-md flex-shrink-0">
                            <i class="fas fa-bolt text-sm"></i>
                        </div>
                        <div
                            class="ml-6 bg-gray-50 rounded-xl p-5 shadow-sm border border-gray-100 w-full flex-1 hover:bg-white hover:shadow-md transition-all">
                            <div class="flex justify-between items-center mb-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xs font-bold uppercase"
                                        x-text="log.username.charAt(0)"></div>
                                    <h4 class="font-bold text-gray-900 capitalize"
                                        x-text="log.username"></h4>
                                </div>
                                <span
                                    class="text-xs text-gray-500 font-mono bg-gray-100 px-2 py-1 rounded"
                                    x-text="log.timestamp"></span>
                            </div>
                            <p class="text-sm font-medium text-emerald-600 mb-1" x-text="log.aktivitas">
                            </p>
                            <p class="text-sm text-gray-600" x-text="log.detail"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>
