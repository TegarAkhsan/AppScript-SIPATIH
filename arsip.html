<div x-show="view === 'naskah_masuk' || view === 'naskah_keluar'"
    x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <div class="flex items-center gap-4">
                <h3 class="text-lg font-bold text-gray-800"
                    x-text="view === 'naskah_masuk' ? 'Daftar Naskah Masuk' : 'Daftar Naskah Keluar'">
                </h3>
                <span x-show="activeBidangFilter"
                    class="px-3 py-1 bg-emerald-100 text-emerald-800 text-xs font-semibold rounded-full flex items-center gap-2">
                    <span x-text="activeBidangFilter"></span>
                    <i class="fas fa-times cursor-pointer hover:text-emerald-900"
                        @click="activeBidangFilter = ''"></i>
                </span>
            </div>
            <div class="flex gap-3">
                <button @click="openForm(view)"
                    class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-bold shadow-md shadow-emerald-100 btn-hover">
                    <i class="fas fa-plus mr-2"></i> Input Naskah Baru
                </button>
                <div class="relative">
                    <input type="text" placeholder="Cari..."
                        class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 outline-none w-48 shadow-sm transition-all focus:w-64">
                    <i class="fas fa-search absolute left-3 top-2.5 text-gray-400"></i>
                </div>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                        <th class="px-6 py-4 font-semibold border-b">No Surat</th>
                        <th class="px-6 py-4 font-semibold border-b">Tanggal Surat</th>
                        <th class="px-6 py-4 font-semibold border-b">Perihal</th>
                        <th class="px-6 py-4 font-semibold border-b">Bidang</th>
                        <th class="px-6 py-4 font-semibold border-b"
                            x-text="view === 'naskah_masuk' ? 'Asal Instansi' : 'Tujuan Instansi'"></th>
                        <th class="px-6 py-4 font-semibold border-b">Sifat</th>
                        <th class="px-6 py-4 font-semibold border-b">Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <template
                        x-for="arsip in filteredArsipData.filter(a => view === 'naskah_masuk' ? a.jenis === 'Masuk' : a.jenis === 'Keluar')"
                        :key="arsip.noIndeks + arsip.noSurat">
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 text-sm text-gray-900 font-medium"
                                x-text="arsip.noSurat"></td>
                            <td class="px-6 py-4 text-sm text-gray-900 font-medium"
                                x-text="arsip.tglSurat"></td>
                            <td class="px-6 py-4 text-sm text-gray-600" x-text="arsip.perihal"></td>
                            <td class="px-6 py-4">
                                <span
                                    class="px-2.5 py-1 bg-emerald-50 text-emerald-700 text-xs rounded-lg font-medium"
                                    x-text="arsip.bidang"></span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-500"
                                x-text="view === 'naskah_masuk' ? (arsip.asalInstansi || '-') : (arsip.tujuanInstansi || '-')">
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-2.5 py-1 text-xs rounded-lg font-medium"
                                    :class="arsip.sifatSurat === 'Penting' ? 'bg-red-50 text-red-700' : (arsip.sifatSurat === 'Rahasia' ? 'bg-purple-50 text-purple-700' : 'bg-emerald-50 text-emerald-700')"
                                    x-text="arsip.sifatSurat"></span>
                            </td>
                            <td class="px-6 py-4 text-sm">
                                <button @click="openPreview(arsip)"
                                    class="text-emerald-600 hover:bg-emerald-50 w-8 h-8 rounded-lg transition-colors"><i
                                        class="fas fa-eye"></i></button>
                                <a :href="arsip.linkFile" target="_blank"
                                    class="text-teal-600 hover:bg-teal-50 w-8 h-8 rounded-lg transition-colors inline-flex items-center justify-center"><i
                                        class="fas fa-download"></i></a>
                            </td>
                        </tr>
                    </template>
                    <template
                        x-if="filteredArsipData.filter(a => view === 'naskah_masuk' ? a.jenis === 'Masuk' : a.jenis === 'Keluar').length === 0">
                        <tr>
                            <td colspan="6" class="px-6 py-12 text-center text-gray-400">
                                <i class="fas fa-folder-open text-4xl mb-3 opacity-20"></i>
                                <p>Belum ada data naskah.</p>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>
