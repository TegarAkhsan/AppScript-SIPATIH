<aside
    class="w-64 bg-white border-r border-gray-200 flex flex-col h-full shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-20">
    <!-- Logo -->
    <div class="h-20 flex items-center px-6 border-b border-gray-100">
        <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center shadow-md">
            <i class="fas fa-folder-open text-white"></i>
        </div>
        <div class="ml-3">
            <h2 class="text-xl font-bold text-gray-900 leading-tight">SIPATIH</h2>
            <p class="text-[10px] text-gray-500 font-medium">Sistem Arsip Digital</p>
        </div>
    </div>

    <!-- User Info -->
    <div class="p-5 border-b border-gray-100 bg-gray-50/50">
        <div class="flex items-center">
            <div
                class="w-10 h-10 rounded-full premium-gradient flex items-center justify-center text-white font-bold shadow-sm">
                <span x-text="user?.username.charAt(0).toUpperCase()"></span>
            </div>
            <div class="ml-3">
                <p class="text-sm font-semibold text-gray-900 capitalize" x-text="user?.username"></p>
                <p class="text-xs text-gray-500 capitalize" x-text="user?.role"></p>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="flex-1 overflow-y-auto py-4">
        <nav class="space-y-1 px-3">
            <a href="#" @click.prevent="navigate('dashboard')"
                :class="view === 'dashboard' ? 'sidebar-active' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
                class="group flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors">
                <i class="fas fa-chart-pie w-6 text-center"
                    :class="view === 'dashboard' ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-500'"></i>
                <span class="ml-2">Dashboard</span>
            </a>

            <a href="#" @click.prevent="navigate('naskah_masuk')"
                :class="view === 'naskah_masuk' ? 'sidebar-active' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
                class="group flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors mt-2">
                <i class="fas fa-envelope-open-text w-6 text-center"
                    :class="view === 'naskah_masuk' ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-500'"></i>
                <span class="ml-2">Naskah Masuk</span>
            </a>

            <a href="#" @click.prevent="navigate('naskah_keluar')"
                :class="view === 'naskah_keluar' ? 'sidebar-active' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
                class="group flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors mt-2">
                <i class="fas fa-paper-plane w-6 text-center"
                    :class="view === 'naskah_keluar' ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-500'"></i>
                <span class="ml-2">Naskah Keluar</span>
            </a>

            <a href="#" @click.prevent="navigate('bidang_dokumen')"
                :class="view === 'bidang_dokumen' ? 'sidebar-active' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
                class="group flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors mt-2">
                <i class="fas fa-layer-group w-6 text-center"
                    :class="view === 'bidang_dokumen' ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-500'"></i>
                <span class="ml-2">Manajemen Dokumen</span>
            </a>

            <div class="pt-4 mt-4 border-t border-gray-100">
                <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Profil Saya
                </p>
                <a href="#" @click.prevent="navigate('profil')"
                    :class="view === 'profil' ? 'sidebar-active' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
                    class="group flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors">
                    <i class="fas fa-user-circle w-6 text-center"
                        :class="view === 'profil' ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-500'"></i>
                    <span class="ml-2">Edit Profil</span>
                </a>
            </div>

            <div x-show="user?.role === 'Admin'" class="pt-4 mt-4 border-t border-gray-100">
                <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Administrator
                </p>
                <a href="#" @click.prevent="navigate('pengguna')"
                    :class="view === 'pengguna' ? 'sidebar-active' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
                    class="group flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors">
                    <i class="fas fa-users-cog w-6 text-center"
                        :class="view === 'pengguna' ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-500'"></i>
                    <span class="ml-2">Pengguna</span>
                </a>
                <a href="#" @click.prevent="navigate('tracking')"
                    :class="view === 'tracking' ? 'sidebar-active' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
                    class="group flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors mt-2">
                    <i class="fas fa-history w-6 text-center"
                        :class="view === 'tracking' ? 'text-emerald-600' : 'text-gray-400 group-hover:text-gray-500'"></i>
                    <span class="ml-2">Tracking Aktivitas</span>
                </a>
            </div>
        </nav>
    </div>

    <!-- Logout -->
    <div class="p-4 border-t border-gray-200">
        <button @click="doLogout"
            class="flex items-center w-full px-3 py-2 text-sm font-medium text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
            <i class="fas fa-sign-out-alt w-6 text-center"></i>
            <span class="ml-2">Logout Sistem</span>
        </button>
    </div>
</aside>
